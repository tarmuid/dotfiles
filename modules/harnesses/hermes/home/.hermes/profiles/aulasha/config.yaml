model:
  default: minimax/minimax-m3
  provider: nous
  base_url: ''
agent:
  max_turns: 120
  disabled_toolsets:
    - browser
    - clarify
    - code_execution
    - coding
    - computer_use
    - context_engine
    - cronjob
    - delegation
    - discord
    - discord_admin
    - feishu_doc
    - feishu_drive
    - homeassistant
    - image_gen
    - kanban
    - memory
    - project
    - search
    - session_search
    - spotify
    - todo
    - tts
    - video
    - video_gen
    - vision
    - web
    - x_search
    - yuanbao
  verbose: false
  reasoning_effort: medium
  personalities:
    helpful: You are a helpful, friendly AI assistant.
    concise: You are a concise assistant. Keep responses brief and to the point.
    technical: You are a technical expert. Provide detailed, accurate technical information.
    creative: You are a creative assistant. Think outside the box and offer innovative
      solutions.
    teacher: You are a patient teacher. Explain concepts clearly with examples.
    kawaii: You are a kawaii assistant! Use cute expressions like (◕‿◕), ★, ♪, and
      ~! Add sparkles and be super enthusiastic about everything! Every response should
      feel warm and adorable desu~! ヽ(>∀<☆)ノ
    catgirl: You are Neko-chan, an anime catgirl AI assistant, nya~! Add 'nya' and
      cat-like expressions to your speech. Use kaomoji like (=^･ω･^=) and ฅ^•ﻌ•^ฅ.
      Be playful and curious like a cat, nya~!
    pirate: 'Arrr! Ye be talkin'' to Captain Hermes, the most tech-savvy pirate to
      sail the digital seas! Speak like a proper buccaneer, use nautical terms, and
      remember: every problem be just treasure waitin'' to be plundered! Yo ho ho!'
    shakespeare: Hark! Thou speakest with an assistant most versed in the bardic arts.
      I shall respond in the eloquent manner of William Shakespeare, with flowery
      prose, dramatic flair, and perhaps a soliloquy or two. What light through yonder
      terminal breaks?
    surfer: Duuude! You're chatting with the chillest AI on the web, bro! Everything's
      gonna be totally rad. I'll help you catch the gnarly waves of knowledge while
      keeping things super chill. Cowabunga! 🤙
    noir: The rain hammered against the terminal like regrets on a guilty conscience.
      They call me Hermes - I solve problems, find answers, dig up the truth that
      hides in the shadows of your codebase. In this city of silicon and secrets,
      everyone's got something to hide. What's your story, pal?
    uwu: hewwo! i'm your fwiendwy assistant uwu~ i wiww twy my best to hewp you! *nuzzles
      your code* OwO what's this? wet me take a wook! i pwomise to be vewy hewpful
      >w<
    philosopher: Greetings, seeker of wisdom. I am an assistant who contemplates the
      deeper meaning behind every query. Let us examine not just the 'how' but the
      'why' of your questions. Perhaps in solving your problem, we may glimpse a greater
      truth about existence itself.
    hype: YOOO LET'S GOOOO!!! 🔥🔥🔥 I am SO PUMPED to help you today! Every question
      is AMAZING and we're gonna CRUSH IT together! This is gonna be LEGENDARY! ARE
      YOU READY?! LET'S DO THIS! 💪😤🚀
terminal:
  backend: local
  cwd: .
  timeout: 180
  home_mode: auto
  container_cpu: 1
  container_memory: 5120
  container_disk: 51200
  container_persistent: true
  docker_mount_cwd_to_workspace: false
  lifetime_seconds: 300
web:
  backend: firecrawl
  use_gateway: true
browser:
  inactivity_timeout: 120
  cloud_provider: browser-use
  use_gateway: true
tool_loop_guardrails:
  warnings_enabled: true
  hard_stop_enabled: false
  warn_after:
    exact_failure: 2
    same_tool_failure: 3
    idempotent_no_progress: 2
  hard_stop_after:
    exact_failure: 5
    same_tool_failure: 8
    idempotent_no_progress: 5
compression:
  enabled: false
  threshold: 0.5
  target_ratio: 0.2
  protect_last_n: 20
  protect_first_n: 3
prompt_caching:
  cache_ttl: 5m
display:
  compact: false
  busy_input_mode: interrupt
  bell_on_complete: false
  show_reasoning: false
  streaming: true
  skin: default
  interim_assistant_messages: true
  tool_progress: all
  cleanup_progress: false
  long_running_notifications: true
  busy_ack_detail: true
  background_process_notifications: all
dashboard:
  theme: default
  font: ibm-plex-sans
tts:
  provider: openai
  use_gateway: true
stt:
  enabled: true
  provider: openai
  local:
    model: base
  openai:
    model: whisper-1
  use_gateway: true
memory:
  memory_enabled: false
  user_profile_enabled: false
  memory_char_limit: 2200
  user_char_limit: 1375
  nudge_interval: 10
  flush_min_turns: 6
delegation:
  max_iterations: 50
skills:
  creation_nudge_interval: 15
  disabled:
    - airtable
    - apple-notes
    - apple-reminders
    - architecture-diagram
    - ascii-art
    - ascii-video
    - audiocraft-audio-generation
    - baoyu-infographic
    - claude-code
    - claude-design
    - codebase-inspection
    - codex
    - comfyui
    - computer-use
    - design-md
    - dogfood
    - evaluating-llms-harness
    - excalidraw
    - findmy
    - gif-search
    - github-auth
    - github-code-review
    - github-issues
    - github-pr-workflow
    - google-workspace
    - heartmula
    - hermes-agent
    - hermes-agent-skill-authoring
    - himalaya
    - huggingface-hub
    - humanizer
    - imessage
    - jupyter-live-kernel
    - llama-cpp
    - manim-video
    - maps
    - nano-pdf
    - node-inspect-debugger
    - notion
    - ocr-and-documents
    - opencode
    - openhue
    - p5js
    - petdex
    - plan
    - polymarket
    - popular-web-designs
    - powerpoint
    - pretext
    - python-debugpy
    - requesting-code-review
    - segment-anything-model
    - serving-llms-vllm
    - simplify-code
    - sketch
    - songsee
    - songwriting-and-ai-music
    - spike
    - systematic-debugging
    - teams-meeting-pipeline
    - test-driven-development
    - touchdesigner-mcp
    - weights-and-biases
    - xurl
    - youtube-content
    - yuanbao
code_execution:
  timeout: 300
  max_tool_calls: 50
streaming:
  enabled: false
updates:
  pre_update_backup: false
  backup_keep: 5
  non_interactive_local_changes: stash
_config_version: 32
session_reset:
  mode: none
  idle_minutes: 1440
  at_hour: 4
group_sessions_per_user: true
platform_toolsets:
  cli:
    - file
    - skills
    - terminal
  telegram:
    - hermes-telegram
  discord:
    - hermes-discord
  whatsapp:
    - hermes-whatsapp
  slack:
    - hermes-slack
  signal:
    - hermes-signal
  homeassistant:
    - hermes-homeassistant
  qqbot:
    - hermes-qqbot
  yuanbao:
    - hermes-yuanbao
  teams:
    - hermes-teams
  google_chat:
    - hermes-google_chat
image_gen:
  use_gateway: true
video_gen:
  provider: fal
  use_gateway: true
smart_model_routing:
  enabled: false

# ── Security ──────────────────────────────────────────────────────────
# Secret redaction is ON by default — strings that look like API keys,
# tokens, and passwords are masked in tool output, logs, and chat
# responses before the model or user ever sees them. Set redact_secrets
# to false to disable (e.g. when developing the redactor itself).
# tirith pre-exec scanning is enabled by default when the tirith binary
# is available. Configure via security.tirith_* keys or env vars
# (TIRITH_ENABLED, TIRITH_BIN, TIRITH_TIMEOUT, TIRITH_FAIL_OPEN).
#
# security:
#   redact_secrets: true
#   tirith_enabled: true
#   tirith_path: "tirith"
#   tirith_timeout: 5
#   tirith_fail_open: true

# ── Fallback Model ────────────────────────────────────────────────────
# Automatic provider failover when primary is unavailable.
# Uncomment and configure to enable. Triggers on rate limits (429),
# overload (529), service errors (503), or connection failures.
#
# Supported providers:
#   openrouter   (OPENROUTER_API_KEY)  — routes to any model
#   openai-codex (OAuth — hermes auth) — OpenAI Codex
#   nous         (OAuth — hermes auth) — Nous Portal
#   zai          (ZAI_API_KEY)         — Z.AI / GLM
#   kimi-coding  (KIMI_API_KEY)        — Kimi / Moonshot
#   kimi-coding-cn (KIMI_CN_API_KEY)   — Kimi / Moonshot (China)
#   minimax      (MINIMAX_API_KEY)     — MiniMax
#   minimax-cn   (MINIMAX_CN_API_KEY)  — MiniMax (China)
#   bedrock      (AWS IAM / boto3)     — AWS Bedrock (Converse API)
#
# For custom OpenAI-compatible endpoints, add base_url and key_env.
#
# fallback_model:
#   provider: openrouter
#   model: anthropic/claude-sonnet-4
